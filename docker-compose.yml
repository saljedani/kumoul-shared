version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: kumoul_db
      POSTGRES_USER: kumoul_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-KumoulSecure2024!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kumoul_user -d kumoul_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      DATABASE_URL: postgresql://kumoul_user:${DB_PASSWORD:-KumoulSecure2024!}@db:5432/kumoul_db
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - web

volumes:
  postgres_data:
  uploads_data:
